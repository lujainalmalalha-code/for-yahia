<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove the Blocks</title>

  <style>
    body {
      margin: 0;
      background: #fff3f7;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
      min-height: 100vh;
      position: relative;
    }

    .container {
      margin-top: 110px;
      position: relative;
      z-index: 5;
    }

    h1 {
      font-size: 28px;
      color: #111;
      margin-bottom: 30px;
      padding: 0 20px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.25s ease, left 0.25s ease, top 0.25s ease;
    }

    #yes {
      background: #ff8fb1;
      color: white;
      position: relative;
      z-index: 6;
      box-shadow: 0 6px 16px rgba(255, 143, 177, 0.35);
    }

    #no {
      background: #d9d9d9;
      color: #333;
      position: absolute;
      left: 58%;
      top: 175px;
      z-index: 6;
    }

    #message {
      margin-top: 35px;
      font-size: 34px;
      font-weight: bold;
      color: #ff5fa2;
      min-height: 50px;
      padding: 0 20px;
      position: relative;
      z-index: 6;
    }

    .heart {
      position: absolute;
      font-size: 22px;
      animation: floatUp 3.5s linear forwards;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-500px) scale(1.5);
        opacity: 0;
      }
    }

    .firework {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      animation: explode 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes explode {
      0% {
        transform: scale(0.2);
        opacity: 1;
      }
      100% {
        transform: scale(8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Will you remove the blocks now? 🥺</h1>

    <button id="yes">Yes 💖</button>
    <button id="no">No 🙈</button>

    <p id="message"></p>
  </div>

  <script>
    const yes = document.getElementById("yes");
    const no = document.getElementById("no");
    const message = document.getElementById("message");

    let noScale = 1;
    let yesScale = 1;

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = (window.innerHeight - 30) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3500);
    }

    function createFirework(x, y) {
      const colors = ["#ff4fa3", "#ff8cc8", "#ffd1e8", "#ff6fb5", "#ffc0cb"];

      for (let i = 0; i < 12; i++) {
        const fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = x + "px";
        fw.style.top = y + "px";
        fw.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(fw);

        const angle = (Math.PI * 2 * i) / 12;
        const distance = 40 + Math.random() * 40;
        fw.animate([
          { transform: "translate(0,0) scale(0.2)", opacity: 1 },
          {
            transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(1.8)`,
            opacity: 0
          }
        ], {
          duration: 900,
          easing: "ease-out"
        });

        setTimeout(() => {
          fw.remove();
        }, 900);
      }
    }

    yes.onclick = function () {
      message.innerHTML = "YAYAYA I miss you 💖🥺";
      message.style.color = "#ff5fa2";

      for (let i = 0; i < 22; i++) {
        setTimeout(createHeart, i * 120);
      }

      createFirework(window.innerWidth * 0.35, window.innerHeight * 0.35);
      createFirework(window.innerWidth * 0.5, window.innerHeight * 0.28);
      createFirework(window.innerWidth * 0.65, window.innerHeight * 0.35);
    };

    no.onmouseover = function () {
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 100;

      const x = Math.random() * maxX;
      const y = 120 + Math.random() * (maxY - 120);

      no.style.left = x + "px";
      no.style.top = y + "px";

      noScale *= 0.82;
      if (noScale < 0.25) noScale = 0.25;
      no.style.transform = "scale(" + noScale + ")";

      yesScale *= 1.12;
      if (yesScale > 2.2) yesScale = 2.2;
      yes.style.transform = "scale(" + yesScale + ")";
    };
  </script>

</body>
</html>
